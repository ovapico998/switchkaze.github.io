<body>

<div class="settingsBlock">
	<div>
		<img id="sourceImage" src='https://raw.githubusercontent.com/ovapico998/switchkaze.github.io/refs/heads/master/assets/base.png'/>
		<canvas id="remapCanvas"></canvas>
	</div>
</div>
	
<div class="colorContainer">
	<table class="paletteBar"><tr>
		<td><span>000</span></td>
		<td><span>000</span></td>
		<td><span>000</span></td>
		<td><span>000</span></td>
		<td><span>000</span></td>

		<td><span>000</span></td>

		<td><span>000</span></td>
		<td><span>000</span></td>
		<td><span>000</span></td>
	</tr></table>
	<div class="colorBar">
	</div>
	
	<div class="settingsBlock">
		<button type="button" id="selectLeft" class="mdl-button mdl-js-button mdl-button--primary">

		</button>

			Add Left
		</button>

		</button>
		
		<button type="button" id="addRight" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--colored">
			Add Right

			Select Right

	</div>

	</div>
	
	<div class="settingsBlock">

	</div>

		<input type="checkbox" id="correctLightness"/>

		<br>

	</div>
